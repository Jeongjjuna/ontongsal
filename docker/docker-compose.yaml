services:
    mysql:
        image: mysql:8.4
        container_name: mysql-8.4
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_USER: user
            MYSQL_PASSWORD: userpassword
        ports:
            - "3306:3306"
        volumes:
            - ./volumes/mysql:/var/lib/mysql

    redis:
        image: redis:8.0
        container_name: redis-8.0
        ports:
            - "6379:6379"
        volumes:
            - ./volumes/redis:/data

    mongo:
        image: mongo:5.0
        container_name: mongo-5.0
        environment:
            MONGO_INITDB_ROOT_USERNAME: root
            MONGO_INITDB_ROOT_PASSWORD: rootpassword
        ports:
            - "27017:27017"
        volumes:
            - ./volumes/mongo:/data/db


