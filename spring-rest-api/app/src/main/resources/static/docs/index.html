<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>API Documentation</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: hsl(0 0% 100%);
            --bg-page: hsl(0 0% 98%);
            --bg-card: hsl(0 0% 100%);
            --bg-inset: hsl(240 4.8% 95.9%);
            --bg-hover: hsl(240 4.8% 93%);
            --text: hsl(240 10% 3.9%);
            --text-secondary: hsl(240 3.8% 30%);
            --text-muted: hsl(240 3.7% 50%);
            --border: hsl(240 5.9% 90%);
            --border-subtle: hsl(240 5.9% 93%);
            --accent: hsl(240 5.9% 10%);
            --accent-hover: hsl(240 5.9% 18%);
            --accent-fg: hsl(0 0% 100%);
            --ring: hsl(221 83% 53%);
            --code-bg: hsl(240 4.8% 95.9%);
            --sidebar-w: 280px;
            --header-h: 56px;
            --shadow-lg: 0 8px 32px -4px hsl(240 10% 3.9% / 0.12);
            --radius: 8px;
            --radius-sm: 6px;
            --radius-lg: 10px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            --transition: 0.15s ease;
            /* Method colours — Swagger convention */
            --get: #16a34a; --get-bg: rgba(22,163,74,.09); --get-border: rgba(22,163,74,.22);
            --post: #2563eb; --post-bg: rgba(37,99,235,.09); --post-border: rgba(37,99,235,.22);
            --put: #d97706; --put-bg: rgba(217,119,6,.09); --put-border: rgba(217,119,6,.22);
            --delete: #dc2626; --delete-bg: rgba(220,38,38,.09); --delete-border: rgba(220,38,38,.22);
            --patch: #7c3aed; --patch-bg: rgba(124,58,237,.09); --patch-border: rgba(124,58,237,.22);
        }

        [data-theme="dark"] {
            --bg: hsl(240 10% 3.9%);
            --bg-page: hsl(240 10% 3.9%);
            --bg-card: hsl(240 10% 5.5%);
            --bg-inset: hsl(240 3.7% 10%);
            --bg-hover: hsl(240 3.7% 13%);
            --text: hsl(0 0% 98%);
            --text-secondary: hsl(240 5% 70%);
            --text-muted: hsl(240 3.7% 50%);
            --border: hsl(240 3.7% 18%);
            --border-subtle: hsl(240 3.7% 14%);
            --accent: hsl(0 0% 98%);
            --accent-hover: hsl(0 0% 90%);
            --accent-fg: hsl(240 10% 3.9%);
            --code-bg: hsl(240 3.7% 10%);
            --shadow-lg: 0 8px 32px -4px hsl(0 0% 0% / 0.5);
            --get: #4ade80; --get-bg: rgba(74,222,128,.1); --get-border: rgba(74,222,128,.22);
            --post: #93c5fd; --post-bg: rgba(147,197,253,.1); --post-border: rgba(147,197,253,.22);
            --put: #fbbf24; --put-bg: rgba(251,191,36,.1); --put-border: rgba(251,191,36,.22);
            --delete: #fca5a5; --delete-bg: rgba(252,165,165,.1); --delete-border: rgba(252,165,165,.22);
            --patch: #c4b5fd; --patch-bg: rgba(196,181,253,.1); --patch-border: rgba(196,181,253,.22);
        }

        body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ── Header ── */
        .header {
            position: sticky; top: 0; z-index: 100;
            display: grid; grid-template-columns: auto 1fr auto; align-items: center;
            height: var(--header-h); padding: 0 20px;
            background: var(--bg-card); border-bottom: 1px solid var(--border);
            backdrop-filter: blur(8px);
        }
        .header-left { display: flex; align-items: center; gap: 12px; justify-self: start; }
        .header-center { display: flex; align-items: center; gap: 10px; justify-self: center; min-width: 0; overflow: hidden; }
        .header-title { font-size: 15px; font-weight: 650; color: var(--text); letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .header-version { font-size: 11px; font-weight: 500; color: var(--text-muted); background: var(--bg-inset); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; }
        .header-actions { display: flex; align-items: center; gap: 6px; justify-self: end; flex-shrink: 0; position: relative; z-index: 1; }

        .icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; border-radius: var(--radius-sm);
            background: transparent; border: 1px solid var(--border-subtle);
            cursor: pointer; color: var(--text-secondary); transition: all var(--transition);
        }
        .icon-btn:hover { background: var(--bg-inset); border-color: var(--border); color: var(--text); }
        .icon-btn svg { width: 16px; height: 16px; }

        .server-select {
            appearance: none; -webkit-appearance: none;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 6px 28px 6px 10px; font-size: 12px; font-family: var(--font-mono);
            color: var(--text-secondary); max-width: 220px; cursor: pointer;
            transition: border-color var(--transition);
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23a0aec0' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat; background-position: right 10px center;
        }
        .server-select:hover { border-color: var(--text-muted); }
        .server-select:focus { outline: 2px solid var(--ring); outline-offset: 1px; border-color: transparent; }

        /* ── Layout ── */
        .layout { display: flex; min-height: calc(100vh - var(--header-h)); }

        /* ── Sidebar ── */
        .sidebar-wrapper { position: relative; display: flex; flex-shrink: 0; }
        .sidebar { width: var(--sidebar-w); background: var(--bg-card); border-right: 1px solid var(--border-subtle); overflow-y: auto; padding: 10px 8px 24px; }
        .resize-handle { position: absolute; top: 0; right: -3px; width: 6px; height: 100%; cursor: col-resize; z-index: 10; transition: background var(--transition); }
        .resize-handle:hover, .resize-handle.active { background: var(--text-muted); opacity: 0.4; }

        .sidebar-group { margin-bottom: 2px; }
        .sidebar-group-title {
            display: flex; align-items: center; gap: 6px;
            font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--text-muted); padding: 10px 10px 5px; user-select: none; cursor: pointer;
            border-radius: var(--radius-sm); transition: color var(--transition);
        }
        .sidebar-group-title:hover { color: var(--text-secondary); }
        .sidebar-group-chevron { display: inline-flex; margin-left: auto; transition: transform 0.2s ease; color: var(--text-muted); }
        .sidebar-group-chevron svg { width: 13px; height: 13px; }
        .sidebar-group-chevron.collapsed { transform: rotate(-90deg); }
        .sidebar-group-items { overflow: hidden; transition: max-height 0.25s ease; }
        .sidebar-group-items.collapsed { max-height: 0 !important; }
        .sidebar-group-count { font-size: 10px; font-weight: 500; background: var(--bg-inset); color: var(--text-muted); padding: 0 5px; border-radius: 8px; line-height: 17px; }

        .sidebar-item {
            display: flex; align-items: center; gap: 8px; padding: 6px 10px;
            cursor: pointer; font-size: 12.5px; color: var(--text-secondary);
            transition: all var(--transition); border-radius: var(--radius-sm); margin: 1px 0;
        }
        .sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
        .sidebar-item.active { background: var(--bg-inset); color: var(--text); font-weight: 500; }
        .sidebar-item.active .sidebar-path { color: var(--text); font-weight: 500; }

        .method-badge {
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 9.5px; font-weight: 700; font-family: var(--font-mono); text-transform: uppercase;
            padding: 2px 5px; border-radius: 4px; min-width: 44px; text-align: center;
            letter-spacing: 0.04em; border: 1px solid transparent; flex-shrink: 0;
        }
        .method-get    { color: var(--get);    background: var(--get-bg);    border-color: var(--get-border); }
        .method-post   { color: var(--post);   background: var(--post-bg);   border-color: var(--post-border); }
        .method-put    { color: var(--put);    background: var(--put-bg);    border-color: var(--put-border); }
        .method-delete { color: var(--delete); background: var(--delete-bg); border-color: var(--delete-border); }
        .method-patch  { color: var(--patch);  background: var(--patch-bg);  border-color: var(--patch-border); }

        .sidebar-path { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-mono); font-size: 11.5px; }

        /* ── Main ── */
        .main { flex: 1; min-width: 0; padding: 36px 48px 80px; max-width: 900px; margin: 0 auto; }

        /* Welcome */
        .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 55vh; text-align: center; gap: 0; }
        .welcome-icon { width: 52px; height: 52px; border-radius: var(--radius); background: var(--bg-inset); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin-bottom: 18px; }
        .welcome-icon svg { width: 26px; height: 26px; color: var(--text-muted); }
        .welcome h2 { font-size: 19px; font-weight: 650; color: var(--text); margin-bottom: 6px; letter-spacing: -0.01em; }
        .welcome p { font-size: 13.5px; color: var(--text-muted); max-width: 320px; line-height: 1.6; }

        /* ── Endpoint header ── */
        .endpoint-header { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border-subtle); }
        .endpoint-method-path { display: inline-flex; align-items: center; gap: 10px; padding: 5px 14px 5px 5px; background: var(--bg-inset); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; }
        .endpoint-method-path .method-badge { font-size: 11px; padding: 4px 10px; border-radius: 5px; min-width: 52px; }
        .endpoint-method-path .path { font-size: 14px; font-family: var(--font-mono); font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
        .endpoint-summary { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -0.025em; line-height: 1.3; }
        .endpoint-description { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }

        /* ── Section ── */
        .section { margin-top: 28px; }
        .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-subtle); }

        /* ── Schema card ── */
        .schema-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .schema-row { display: grid; grid-template-columns: minmax(130px,1fr) 76px 2fr; padding: 9px 16px; font-size: 13px; border-bottom: 1px solid var(--border-subtle); transition: background var(--transition); }
        .schema-row.schema-row-4col { grid-template-columns: minmax(130px,1fr) 66px 70px 2fr minmax(90px,1.2fr); }
        .schema-row:last-child { border-bottom: none; }
        .schema-row:hover { background: var(--bg-inset); }
        .schema-row-head { background: var(--bg-inset); font-weight: 600; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); padding: 7px 16px; }
        .schema-row-head:hover { background: var(--bg-inset); }
        .prop-name-row { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-bottom: 2px; }
        .prop-name { font-family: var(--font-mono); font-weight: 600; color: var(--text); font-size: 12.5px; }
        .prop-type { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
        .prop-required { display: inline-block; font-size: 9px; font-weight: 700; color: var(--delete); background: var(--delete-bg); padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.03em; }
        .prop-desc { color: var(--text-secondary); font-size: 13px; }
        .prop-example { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); background: var(--code-bg); padding: 1px 6px; border-radius: 3px; word-break: break-all; }

        /* ── Status badge ── */
        .status-badge { display: inline-flex; align-items: center; gap: 5px; font-weight: 600; font-family: var(--font-mono); font-size: 12px; padding: 3px 10px; border-radius: var(--radius-sm); }
        .status-2xx { color: var(--get); background: var(--get-bg); }
        .status-4xx { color: var(--put); background: var(--put-bg); }
        .status-5xx { color: var(--delete); background: var(--delete-bg); }

        .response-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 8px; }
        .response-card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 16px; cursor: pointer; user-select: none; transition: background var(--transition); }
        .response-card-header:hover { background: var(--bg-hover); }
        .response-card-header-left { display: flex; align-items: center; gap: 10px; }
        .response-card-body { border-top: 1px solid var(--border-subtle); }

        /* ── Example block ── */
        .example-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin: 12px 0 5px; }
        .example-wrapper { position: relative; }
        .example-wrapper:hover .copy-btn { opacity: 1; }
        .copy-btn { position: absolute; top: 7px; right: 7px; display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-muted); cursor: pointer; opacity: 0; transition: all var(--transition); z-index: 1; }
        .copy-btn:hover { color: var(--text); border-color: var(--border); background: var(--bg-inset); }
        .copy-btn.copied { color: var(--get); border-color: var(--get-border); background: var(--get-bg); opacity: 1; }
        .copy-btn svg { width: 12px; height: 12px; }
        .example-block { background: var(--code-bg); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); padding: 13px 38px 13px 14px; font-family: var(--font-mono); font-size: 12px; line-height: 1.65; overflow-x: auto; white-space: pre-wrap; color: var(--text-secondary); }
        .schema-note { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); background: var(--bg-inset); padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; font-weight: 500; }

        /* ── Try it panel ── */
        .try-panel { margin-top: 28px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg-card); }
        .try-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: var(--bg-inset); cursor: pointer; user-select: none; transition: background var(--transition); }
        .try-header:hover { background: var(--bg-hover); }
        .try-header h3 { font-size: 12.5px; font-weight: 650; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
        .try-header h3::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--get); }
        .try-body { padding: 18px 20px; }
        .try-url-bar { display: flex; align-items: center; background: var(--bg-inset); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 18px; }
        .try-url-method { padding: 8px 12px; font-size: 11px; font-weight: 700; font-family: var(--font-mono); text-transform: uppercase; border-right: 1px solid var(--border); white-space: nowrap; }
        .try-url-path { flex: 1; padding: 8px 12px; font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); overflow-x: auto; white-space: nowrap; }
        .field-group { margin-bottom: 14px; }
        .field-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 7px; }
        .param-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .param-row label { min-width: 100px; font-size: 12px; font-weight: 550; font-family: var(--font-mono); color: var(--text); }
        .param-row .param-in { font-size: 10px; color: var(--text-muted); font-weight: 400; }

        .kv-rows { margin-bottom: 4px; }
        .kv-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
        .kv-row .input-field { flex: 1; }
        .kv-remove-btn { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border: none; border-radius: var(--radius-sm); background: transparent; color: var(--text-muted); cursor: pointer; transition: all var(--transition); flex-shrink: 0; }
        .kv-remove-btn:hover { background: var(--delete-bg); color: var(--delete); }
        .kv-remove-btn svg { width: 14px; height: 14px; }
        .kv-add-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border: 1px dashed var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer; transition: all var(--transition); }
        .kv-add-btn:hover { border-color: var(--text-muted); color: var(--text-secondary); background: var(--bg-inset); }
        .kv-add-btn svg { width: 11px; height: 11px; }

        .input-field { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12.5px; font-family: var(--font-mono); background: var(--bg-card); color: var(--text); transition: border-color var(--transition); outline: none; }
        .input-field:hover { border-color: var(--text-muted); }
        .input-field:focus { outline: 2px solid var(--ring); outline-offset: 1px; border-color: transparent; }
        .body-editor { width: 100%; min-height: 120px; padding: 11px 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-mono); font-size: 12.5px; background: var(--bg-card); color: var(--text); resize: vertical; line-height: 1.6; tab-size: 2; transition: border-color var(--transition); outline: none; }
        .body-editor:hover { border-color: var(--text-muted); }
        .body-editor:focus { outline: 2px solid var(--ring); outline-offset: 1px; border-color: transparent; }

        .send-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; background: var(--accent); color: var(--accent-fg); border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .send-btn svg { width: 13px; height: 13px; }

        .response-panel { margin-top: 18px; }
        .response-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .response-time { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); }
        .response-body { background: var(--code-bg); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); padding: 13px 15px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; overflow-x: auto; white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow-y: auto; color: var(--text-secondary); }

        .chevron { display: inline-flex; transition: transform 0.25s ease; color: var(--text-muted); }
        .chevron svg { width: 15px; height: 15px; }
        .chevron.open { transform: rotate(180deg); }

        /* ── Mobile ── */
        .menu-toggle { display: none; background: none; border: none; cursor: pointer; padding: 4px; color: var(--text); }
        .menu-toggle svg { width: 20px; height: 20px; }
        .sidebar-overlay { display: none; }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .header { padding: 0 14px; }
            .resize-handle { display: none; }
            .sidebar-wrapper { position: fixed; top: var(--header-h); left: calc(-1 * var(--sidebar-w) - 20px); height: calc(100vh - var(--header-h)); z-index: 50; transition: left 0.28s cubic-bezier(0.4,0,0.2,1); }
            .sidebar-wrapper.open { left: 0; }
            .sidebar { height: 100%; border-right: none; }
            .sidebar-wrapper.open .sidebar { box-shadow: 0 4px 24px -4px hsl(240 10% 3.9%/.12); }
            .sidebar-overlay { display: block; position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 49; opacity: 0; pointer-events: none; transition: opacity 0.28s ease; }
            .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
            .main { padding: 20px 16px 40px; }
            .server-select { display: none; }
        }

        /* ── Loading ── */
        .loading { display: flex; align-items: center; justify-content: center; height: 55vh; color: var(--text-muted); font-size: 13px; gap: 10px; }
        .loading-spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--text-muted); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease; }

        /* ── Sidebar search ── */
        .sidebar-search-wrap { padding: 6px 6px 8px; }
        .sidebar-search { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text); font-size: 12px; outline: none; transition: border-color var(--transition); }
        .sidebar-search:focus { border-color: var(--text-muted); }
        .sidebar-search::placeholder { color: var(--text-muted); }

        /* ── Response history tabs ── */
        .resp-history-tabs { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
        .resp-history-tab { padding: 3px 9px; font-size: 11px; font-family: var(--font-mono); border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-inset); color: var(--text-muted); cursor: pointer; transition: all var(--transition); }
        .resp-history-tab.active { background: var(--bg-card); color: var(--text); border-color: var(--text-muted); }
        .resp-history-tab .tab-status-2xx { color: var(--get); }
        .resp-history-tab .tab-status-4xx { color: var(--put); }
        .resp-history-tab .tab-status-5xx { color: var(--delete); }

        /* ── Auth modal ── */
        .auth-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
        .auth-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 360px; z-index: 201; box-shadow: var(--shadow-lg); }
        .auth-modal.open, .auth-modal-overlay.open { display: block; }
        .auth-modal-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        .auth-modal-label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 6px; }
        .auth-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
        .auth-clear-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: background var(--transition); }
        .auth-clear-btn:hover { background: var(--bg-inset); }
        #authBtn { position: relative; }
        #authBtn.has-token::after { content: ''; position: absolute; top: 6px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: var(--get); }

        /* ── cURL button ── */
        .curl-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--transition); }
        .curl-btn:hover { background: var(--bg-inset); color: var(--text); border-color: var(--text-muted); }
        .curl-btn.copied { color: var(--get); border-color: var(--get-border); background: var(--get-bg); }
        .curl-btn svg { width: 12px; height: 12px; }

        /* ── JSON tree ── */
        .json-tree { background: var(--code-bg); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); padding: 13px 15px; font-family: var(--font-mono); font-size: 12px; line-height: 1.65; max-height: 400px; overflow-y: auto; overflow-x: auto; color: var(--text-secondary); }
        .json-node { display: inline; }
        .json-node-toggle { cursor: pointer; user-select: none; display: inline; }
        .json-node-toggle:hover .json-open-bracket, .json-node-toggle:hover .json-folded-preview { opacity: 0.7; }
        .json-folded-preview { color: var(--text-muted); display: none; }
        .json-children { display: block; margin-left: 16px; }
        .json-close-bracket { display: block; }
        .json-child { display: block; }
        .json-collapsed .json-folded-preview { display: inline; }
        .json-collapsed .json-open-bracket { display: none; }
        .json-collapsed .json-children { display: none; }
        .json-collapsed .json-close-bracket { display: none; }
        .json-key { color: var(--text); }
        .json-string { color: var(--get); }
        .json-number { color: var(--post); }
        .json-boolean { color: var(--put); }
        .json-null { color: var(--text-muted); }

        /* ── Vars modal ── */
        .vars-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 440px; max-height: 80vh; overflow-y: auto; z-index: 201; box-shadow: var(--shadow-lg); }
        .vars-modal.open { display: block; }
        .vars-modal-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .vars-modal-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
        #varsBtn { position: relative; }
        #varsBtn.has-vars::after { content: ''; position: absolute; top: 6px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: var(--post); }
    </style>
</head>
